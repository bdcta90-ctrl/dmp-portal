// ===== Treemap Layout (Squarified) =====
function squarify(items, x, y, w, h) {
  const totalVal = items.reduce((s, i) => s + i.emp, 0);
  const rects = [];
  let remaining = [...items].sort((a, b) => b.emp - a.emp);
  let cx = x, cy = y, cw = w, ch = h;

  while (remaining.length > 0) {
    const isHoriz = cw >= ch;
    const side = isHoriz ? ch : cw;
    const totalRemaining = remaining.reduce((s, i) => s + i.emp, 0);
    let row = [remaining[0]];
    let rowArea = remaining[0].emp;

    for (let i = 1; i < remaining.length; i++) {
      const testRow = [...row, remaining[i]];
      const testArea = rowArea + remaining[i].emp;
      if (worstRatio(testRow, testArea, side, totalRemaining, isHoriz ? cw : ch) <=
          worstRatio(row, rowArea, side, totalRemaining, isHoriz ? cw : ch)) {
        row = testRow;
        rowArea = testArea;
      } else break;
    }

    const rowFrac = rowArea / totalRemaining;
    const rowSize = isHoriz ? cw * rowFrac : ch * rowFrac;
    let pos = isHoriz ? cy : cx;

    for (const item of row) {
      const itemFrac = item.emp / rowArea;
      const itemSize = side * itemFrac;
      if (isHoriz) {
        rects.push({ ...item, rx: cx, ry: pos, rw: rowSize, rh: itemSize });
        pos += itemSize;
      } else {
        rects.push({ ...item, rx: pos, ry: cy, rw: itemSize, rh: rowSize });
        pos += itemSize;
      }
    }

    if (isHoriz) { cx += rowSize; cw -= rowSize; }
    else { cy += rowSize; ch -= rowSize; }

    remaining = remaining.slice(row.length);
  }
  return rects;
}

function worstRatio(row, rowArea, side, totalArea, fullSide) {
  const rowSize = (rowArea / totalArea) * fullSide;
  if (rowSize === 0) return Infinity;
  let worst = 0;
  for (const item of row) {
    const frac = item.emp / rowArea;
    const w = rowSize;
    const h = side * frac;
    const ratio = Math.max(w / h, h / w);
    worst = Math.max(worst, ratio);
  }
  return worst;
}

// ===== Rendering =====
const canvas = document.getElementById('treemap');
const ctx = canvas.getContext('2d');
let currentMode = 'outlook';
let rects = [];
let hoveredIdx = -1;

function resize() {
  const container = canvas.parentElement;
  const w = container.clientWidth;
  const h = Math.max(500, w * 0.65);
  canvas.width = w * 2;
  canvas.height = h * 2;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(2, 2);
  const pad = 6;
  rects = squarify(occupations, pad, pad, w - pad * 2, h - pad * 2);
  draw();
}

function draw() {
  const w = canvas.width / 2;
  const h = canvas.height / 2;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);

  const mode = modes[currentMode];
  const gap = 1;

  rects.forEach((r, i) => {
    const rx = r.rx + gap;
    const ry = r.ry + gap;
    const rw = r.rw - gap * 2;
    const rh = r.rh - gap * 2;
    if (rw < 1 || rh < 1) return;

    ctx.fillStyle = mode.getColor(r);
    if (i === hoveredIdx) {
      ctx.fillStyle = brighten(mode.getColor(r), 1.4);
    }
    ctx.beginPath();
    roundRect(ctx, rx, ry, rw, rh, 2);
    ctx.fill();

    if (i === hoveredIdx) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // 텍스트
    if (rw > 30 && rh > 18) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      const fontSize = Math.min(Math.max(rw / 8, 8), 14);
      ctx.font = `600 ${fontSize}px 'Apple SD Gothic Neo','Malgun Gothic',sans-serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const name = truncate(r.name, rw - 6, ctx);
      ctx.fillText(name, rx + 4, ry + 3);

      if (rh > 30) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        const subSize = Math.max(fontSize - 2, 7);
        ctx.font = `400 ${subSize}px 'Apple SD Gothic Neo',sans-serif`;
        const sub = mode.format(r);
        ctx.fillText(sub, rx + 4, ry + 3 + fontSize + 2);
      }
      if (rh > 44 && rw > 50) {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        const empSize = Math.max(fontSize - 3, 7);
        ctx.font = `400 ${empSize}px 'Apple SD Gothic Neo',sans-serif`;
        ctx.fillText((r.emp / 10000).toFixed(1) + '만명', rx + 4, ry + 3 + fontSize + (fontSize - 2) + 6);
      }
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function truncate(text, maxW, ctx) {
  if (ctx.measureText(text).width <= maxW) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
  return t + '…';
}

function brighten(hslStr, factor) {
  const m = hslStr.match(/hsl\(([^,]+),([^,]+)%,([^)]+)%\)/);
  if (!m) return hslStr;
  return `hsl(${m[1]},${m[2]}%,${Math.min(parseFloat(m[3]) * factor, 70)}%)`;
}

// ===== Tooltip =====
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let found = -1;
  for (let i = rects.length - 1; i >= 0; i--) {
    const r = rects[i];
    if (mx >= r.rx && mx <= r.rx + r.rw && my >= r.ry && my <= r.ry + r.rh) {
      found = i; break;
    }
  }
  if (found !== hoveredIdx) {
    hoveredIdx = found;
    ctx.setTransform(2, 0, 0, 2, 0, 0);
    draw();
  }
  if (found >= 0) {
    const d = rects[found];
    const mode = modes[currentMode];
    tooltip.style.display = 'block';
    tooltip.innerHTML = `
      <div class="tt-title">${d.name}</div>
      <div class="tt-row"><span class="tt-label">산업분류</span><span class="tt-value">${d.cat}</span></div>
      <div class="tt-row"><span class="tt-label">취업자 수</span><span class="tt-value">${(d.emp).toLocaleString()}명</span></div>
      <div class="tt-row"><span class="tt-label">중위 연봉</span><span class="tt-value">${d.pay.toLocaleString()}만원</span></div>
      <div class="tt-row"><span class="tt-label">학력 요건</span><span class="tt-value">${eduLabels[d.edu]}</span></div>
      <div class="tt-row"><span class="tt-label">고용 전망</span><span class="tt-value" style="color:${d.outlook>=0?'#6c6':'#f66'}">${d.outlook > 0 ? '+' : ''}${d.outlook}%</span></div>
      <div class="tt-row"><span class="tt-label">AI 대체위험</span><span class="tt-value">${d.ai.toFixed(1)}/10</span></div>
      <div class="tt-desc">${d.aiDesc}</div>
    `;
    let tx = e.clientX + 16;
    let ty = e.clientY + 16;
    if (tx + 320 > window.innerWidth) tx = e.clientX - 330;
    if (ty + 250 > window.innerHeight) ty = e.clientY - 260;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredIdx = -1;
  tooltip.style.display = 'none';
  ctx.setTransform(2, 0, 0, 2, 0, 0);
  draw();
});

// ===== Sidebar Stats =====
function updateSidebar() {
  const sb = document.getElementById('sidebar');
  const mode = modes[currentMode];
  const totalEmp = occupations.reduce((s, d) => s + d.emp, 0);

  // 가중 평균
  const wavg = occupations.reduce((s, d) => s + mode.getValue(d) * d.emp, 0) / totalEmp;

  let html = '';

  // 주요 지표
  html += `<div class="stat-card">
    <h3>전체 가중 평균 · ${mode.title}</h3>
    <div class="big-num">${currentMode === 'pay' ? Math.round(wavg).toLocaleString() + '만원' :
      currentMode === 'outlook' ? (wavg > 0 ? '+' : '') + wavg.toFixed(1) + '%' :
      currentMode === 'education' ? eduLabels[Math.round(wavg)] :
      wavg.toFixed(1) + '/10'}</div>
    <div class="sub">전체 약 ${(totalEmp / 10000).toFixed(0)}만 취업자 가중 평균</div>
  </div>`;

  // 분포 히스토그램
  if (currentMode === 'outlook') {
    const buckets = [
      {label:'성장 (5%+)', min:5, max:99, color:'#2d8a4e'},
      {label:'증가 (1~4%)', min:1, max:4.9, color:'#5aaa5a'},
      {label:'보합 (0%)', min:0, max:0, color:'#888'},
      {label:'감소 (-1~-4%)', min:-4.9, max:-1, color:'#cc7744'},
      {label:'급감 (-5%~)', min:-99, max:-5, color:'#cc4444'},
    ];
    html += buildHistogram('고용 전망 분포', buckets, d => d.outlook, totalEmp);
  } else if (currentMode === 'pay') {
    const buckets = [
      {label:'~2,000만', min:0, max:2000, color:'#cc4444'},
      {label:'2,000~3,000', min:2001, max:3000, color:'#cc7744'},
      {label:'3,000~4,000', min:3001, max:4000, color:'#aa8844'},
      {label:'4,000~5,500', min:4001, max:5500, color:'#5aaa5a'},
      {label:'5,500만+', min:5501, max:99999, color:'#2d8a4e'},
    ];
    html += buildHistogram('임금 분포', buckets, d => d.pay, totalEmp);
  } else if (currentMode === 'education') {
    const buckets = eduLabels.map((l, i) => ({label:l, min:i, max:i, color:
      `hsl(${120 - 120*(i/5)},60%,42%)`}));
    html += buildHistogram('학력 요건 분포', buckets, d => d.edu, totalEmp);
  } else {
    const buckets = [
      {label:'안전 (0~2)', min:0, max:2.9, color:'#2d8a4e'},
      {label:'낮음 (3~4)', min:3, max:4.9, color:'#5aaa5a'},
      {label:'보통 (5~6)', min:5, max:6.9, color:'#aa8844'},
      {label:'높음 (7~8)', min:7, max:8.9, color:'#cc7744'},
      {label:'매우높음 (9+)', min:9, max:10, color:'#cc4444'},
    ];
    html += buildHistogram('AI 대체위험 분포', buckets, d => d.ai, totalEmp);
  }

  // 산업별 가중평균
  const cats = {};
  occupations.forEach(d => {
    if (!cats[d.cat]) cats[d.cat] = {emp: 0, wsum: 0};
    cats[d.cat].emp += d.emp;
    cats[d.cat].wsum += mode.getValue(d) * d.emp;
  });
  const catArr = Object.entries(cats).map(([k, v]) => ({
    name: k, emp: v.emp, avg: v.wsum / v.emp
  })).sort((a, b) => b.emp - a.emp);

  html += `<div class="stat-card"><h3>산업별 · ${mode.title}</h3>`;
  const maxEmp = Math.max(...catArr.map(c => c.emp));
  catArr.forEach(c => {
    const pct = (c.emp / maxEmp * 100).toFixed(0);
    const avgStr = currentMode === 'pay' ? Math.round(c.avg).toLocaleString() + '만' :
      currentMode === 'outlook' ? (c.avg > 0 ? '+' : '') + c.avg.toFixed(1) + '%' :
      currentMode === 'education' ? eduLabels[Math.round(c.avg)] :
      c.avg.toFixed(1);
    html += `<div class="hist-row">
      <div class="hist-label">${c.name}</div>
      <div class="hist-bar-bg"><div class="hist-bar" style="width:${pct}%;background:${mode.getColor({outlook:c.avg,pay:c.avg,edu:c.avg,ai:c.avg})}"></div></div>
      <div class="hist-val">${avgStr}</div>
    </div>`;
  });
  html += '</div>';

  // AI 모드일 때: 위험 직업 TOP 5
  if (currentMode === 'ai') {
    const top5 = [...occupations].sort((a, b) => b.ai - a.ai).slice(0, 8);
    html += `<div class="stat-card"><h3>AI 대체 고위험 직업 TOP 8</h3>`;
    top5.forEach(d => {
      html += `<div class="tier-row">
        <div class="tier-color" style="background:${modes.ai.getColor(d)}"></div>
        <div class="tier-label">${d.name}</div>
        <div class="tier-count">${d.ai.toFixed(1)}</div>
        <div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div>
      </div>`;
    });
    html += '</div>';
  }

  // outlook 모드일 때: 성장/감소 TOP
  if (currentMode === 'outlook') {
    const growing = [...occupations].sort((a, b) => b.outlook - a.outlook).slice(0, 5);
    const declining = [...occupations].sort((a, b) => a.outlook - b.outlook).slice(0, 5);
    html += `<div class="stat-card"><h3>🔥 성장 직업 TOP 5</h3>`;
    growing.forEach(d => {
      html += `<div class="tier-row">
        <div class="tier-color" style="background:#2d8a4e"></div>
        <div class="tier-label">${d.name}</div>
        <div class="tier-count">+${d.outlook}%</div>
        <div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div>
      </div>`;
    });
    html += '</div>';
    html += `<div class="stat-card"><h3>📉 감소 직업 TOP 5</h3>`;
    declining.forEach(d => {
      html += `<div class="tier-row">
        <div class="tier-color" style="background:#cc4444"></div>
        <div class="tier-label">${d.name}</div>
        <div class="tier-count">${d.outlook}%</div>
        <div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div>
      </div>`;
    });
    html += '</div>';
  }

  // pay 모드일 때: 고임금/저임금 TOP
  if (currentMode === 'pay') {
    const highPay = [...occupations].sort((a, b) => b.pay - a.pay).slice(0, 5);
    const lowPay = [...occupations].sort((a, b) => a.pay - b.pay).slice(0, 5);
    html += `<div class="stat-card"><h3>💎 고임금 직업 TOP 5</h3>`;
    highPay.forEach(d => {
      html += `<div class="tier-row">
        <div class="tier-color" style="background:#2d8a4e"></div>
        <div class="tier-label">${d.name}</div>
        <div class="tier-count">${d.pay.toLocaleString()}만</div>
        <div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div>
      </div>`;
    });
    html += '</div>';
  }

  sb.innerHTML = html;
}

function buildHistogram(title, buckets, getter, totalEmp) {
  let html = `<div class="stat-card"><h3>${title}</h3>`;
  const counts = buckets.map(b => {
    let cnt = 0;
    occupations.forEach(d => {
      const v = getter(d);
      if (b.min <= 0 && b.max <= 0) {
        if (v >= b.min && v <= b.max) cnt += d.emp;
      } else if (b.min < 0) {
        if (v >= b.min && v <= b.max) cnt += d.emp;
      } else {
        if (v >= b.min && v <= b.max) cnt += d.emp;
      }
    });
    return cnt;
  });
  const maxCnt = Math.max(...counts);
  buckets.forEach((b, i) => {
    const pct = (counts[i] / maxCnt * 100).toFixed(0);
    const empPct = (counts[i] / totalEmp * 100).toFixed(1);
    html += `<div class="hist-row">
      <div class="hist-label">${b.label}</div>
      <div class="hist-bar-bg"><div class="hist-bar" style="width:${pct}%;background:${b.color}"></div></div>
      <div class="hist-val">${empPct}%</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ===== Legend Gradient =====
function updateGradient() {
  const gc = document.getElementById('gradientCanvas');
  const gctx = gc.getContext('2d');
  const g = gctx.createLinearGradient(0, 0, 200, 0);
  const mode = modes[currentMode];
  g.addColorStop(0, `rgb(${mode.gradLow.join(',')})`);
  g.addColorStop(1, `rgb(${mode.gradHigh.join(',')})`);
  gctx.fillStyle = g;
  gctx.fillRect(0, 0, 200, 12);
  document.getElementById('legendLow').textContent = mode.lowLabel;
  document.getElementById('legendHigh').textContent = mode.highLabel;
}

// ===== Button Handlers =====
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    updateGradient();
    ctx.setTransform(2, 0, 0, 2, 0, 0);
    draw();
    updateSidebar();
  });
});

// ===== Init =====
window.addEventListener('resize', () => {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  resize();
  updateSidebar();
});
resize();
updateGradient();
updateSidebar();
</script>
