function hsl(h,s,l){return `hsl(${h},${s}%,${l}%)`;}

// ===== Squarified Treemap =====
function squarify(items,x,y,w,h){
  const rects=[];
  let rem=[...items].sort((a,b)=>b.emp-a.emp);
  let cx=x,cy=y,cw=w,ch=h;
  const totalVal=rem.reduce((s,i)=>s+i.emp,0);
  while(rem.length>0){
    const isH=cw>=ch;
    const side=isH?ch:cw;
    const totalRem=rem.reduce((s,i)=>s+i.emp,0);
    let row=[rem[0]],rowA=rem[0].emp;
    for(let i=1;i<rem.length;i++){
      const tRow=[...row,rem[i]],tA=rowA+rem[i].emp;
      if(wr(tRow,tA,side,totalRem,isH?cw:ch)<=wr(row,rowA,side,totalRem,isH?cw:ch)){
        row=tRow;rowA=tA;
      }else break;
    }
    const rF=rowA/totalRem;
    const rS=isH?cw*rF:ch*rF;
    let pos=isH?cy:cx;
    for(const item of row){
      const iF=item.emp/rowA;
      const iS=side*iF;
      if(isH){rects.push({...item,rx:cx,ry:pos,rw:rS,rh:iS});pos+=iS;}
      else{rects.push({...item,rx:pos,ry:cy,rw:iS,rh:rS});pos+=iS;}
    }
    if(isH){cx+=rS;cw-=rS;}else{cy+=rS;ch-=rS;}
    rem=rem.slice(row.length);
  }
  return rects;
}
function wr(row,rA,side,tA,fS){
  const rS=(rA/tA)*fS;if(rS===0)return Infinity;
  let w=0;for(const i of row){const f=i.emp/rA;const ww=rS;const hh=side*f;
  w=Math.max(w,Math.max(ww/hh,hh/ww));}return w;
}

function getVisibleData(){
  if(zoomedCat) return occupations.filter(d=>d.cat===zoomedCat);
  return occupations;
}

function resize(){
  const container=canvas.parentElement;
  const w=container.clientWidth;
  const h=Math.max(500,w*0.65);
  canvas.width=w*2;canvas.height=h*2;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(2,0,0,2,0,0);
  const pad=6;
  const visData=getVisibleData();
  if(zoomedCat){
    rects=squarify(visData,pad,pad,w-pad*2,h-pad*2);
  }else{
    // Group by category, then layout categories, then within each
    const cats={};
    visData.forEach(d=>{if(!cats[d.cat])cats[d.cat]={items:[],emp:0};cats[d.cat].items.push(d);cats[d.cat].emp+=d.emp;});
    const catList=Object.entries(cats).map(([k,v])=>({name:k,emp:v.emp,items:v.items})).sort((a,b)=>b.emp-a.emp);
    const catRects=squarify(catList.map(c=>({name:c.name,emp:c.emp,cat:c.name})),pad,pad,w-pad*2,h-pad*2);
    rects=[];
    catRects.forEach((cr,ci)=>{
      const cat=catList[ci];
      const innerPad=1;
      const inner=squarify(cat.items,cr.rx+innerPad,cr.ry+innerPad,cr.rw-innerPad*2,cr.rh-innerPad*2);
      rects.push(...inner);
    });
  }
  draw();
  highlightSearch();
}

function draw(){
  const w=canvas.width/2,h=canvas.height/2;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,w,h);
  const mode=modes[currentMode];
  const gap=zoomedCat?1.5:0.8;

  rects.forEach((r,i)=>{
    const rx=r.rx+gap,ry=r.ry+gap,rw=r.rw-gap*2,rh=r.rh-gap*2;
    if(rw<0.5||rh<0.5)return;
    ctx.fillStyle=mode.getColor(r);
    if(i===hoveredIdx) ctx.fillStyle=brighten(mode.getColor(r),1.4);
    ctx.beginPath();roundRect(ctx,rx,ry,rw,rh,zoomedCat?3:1.5);ctx.fill();
    if(i===hoveredIdx){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}

    // Text
    const minW=zoomedCat?28:20;
    const minH=zoomedCat?16:12;
    if(rw>minW&&rh>minH){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      const fs=Math.min(Math.max(rw/(zoomedCat?7:9),7),zoomedCat?14:11);
      ctx.font=`600 ${fs}px 'Apple SD Gothic Neo','Malgun Gothic',sans-serif`;
      ctx.textAlign='left';ctx.textBaseline='top';
      ctx.fillText(truncate(r.name,rw-5,ctx),rx+3,ry+2);
      if(rh>minH+14){
        ctx.fillStyle='rgba(255,255,255,0.5)';
        const ss=Math.max(fs-2,6);
        ctx.font=`400 ${ss}px 'Apple SD Gothic Neo',sans-serif`;
        ctx.fillText(mode.format(r),rx+3,ry+2+fs+1);
      }
      if(rh>minH+28&&rw>40){
        ctx.fillStyle='rgba(255,255,255,0.3)';
        const es=Math.max(fs-3,6);
        ctx.font=`400 ${es}px 'Apple SD Gothic Neo',sans-serif`;
        ctx.fillText((r.emp/10000).toFixed(1)+'만명',rx+3,ry+2+fs+(fs-2)+4);
      }
    }
  });

  // Category labels in overview mode
  if(!zoomedCat){
    const cats={};
    rects.forEach(r=>{
      if(!cats[r.cat]) cats[r.cat]={minX:Infinity,minY:Infinity,maxX:0,maxY:0};
      const c=cats[r.cat];
      c.minX=Math.min(c.minX,r.rx);c.minY=Math.min(c.minY,r.ry);
      c.maxX=Math.max(c.maxX,r.rx+r.rw);c.maxY=Math.max(c.maxY,r.ry+r.rh);
    });
    Object.entries(cats).forEach(([name,b])=>{
      const bw=b.maxX-b.minX,bh=b.maxY-b.minY;
      if(bw>60&&bh>30){
        const fs=Math.min(Math.max(bw/10,9),16);
        ctx.font=`700 ${fs}px 'Apple SD Gothic Neo',sans-serif`;
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(name,b.minX+bw/2,b.minY+bh/2);
      }
    });
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
}
function truncate(t,mw,ctx){if(ctx.measureText(t).width<=mw)return t;while(t.length>1&&ctx.measureText(t+'…').width>mw)t=t.slice(0,-1);return t+'…';}
function brighten(hslStr,f){const m=hslStr.match(/hsl\(([^,]+),([^,]+)%,([^)]+)%\)/);if(!m)return hslStr;return `hsl(${m[1]},${m[2]}%,${Math.min(parseFloat(m[3])*f,70)}%)`;}

// ===== Tooltip =====
const tooltip=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let found=-1;
  for(let i=rects.length-1;i>=0;i--){
    const r=rects[i];
    if(mx>=r.rx&&mx<=r.rx+r.rw&&my>=r.ry&&my<=r.ry+r.rh){found=i;break;}
  }
  if(found!==hoveredIdx){hoveredIdx=found;ctx.setTransform(2,0,0,2,0,0);draw();highlightSearch();}
  if(found>=0){
    const d=rects[found];const mode=modes[currentMode];
    tooltip.style.display='block';
    tooltip.innerHTML=`
      <div class="tt-title">${d.name}</div>
      <div class="tt-row"><span class="tt-label">산업분류</span><span class="tt-value">${d.cat}</span></div>
      <div class="tt-row"><span class="tt-label">취업자 수</span><span class="tt-value">${d.emp.toLocaleString()}명</span></div>
      <div class="tt-row"><span class="tt-label">중위 연봉</span><span class="tt-value">${d.pay.toLocaleString()}만원</span></div>
      <div class="tt-row"><span class="tt-label">학력 요건</span><span class="tt-value">${eduLabels[d.edu]}</span></div>
      <div class="tt-row"><span class="tt-label">고용 전망</span><span class="tt-value" style="color:${d.outlook>=0?'#6c6':'#f66'}">${d.outlook>0?'+':''}${d.outlook}%</span></div>
      <div class="tt-row"><span class="tt-label">AI 대체위험</span><span class="tt-value">${d.ai.toFixed(1)}/10</span></div>
      <div class="tt-desc">${d.aiDesc}</div>`;
    let tx=e.clientX+16,ty=e.clientY+16;
    if(tx+320>window.innerWidth)tx=e.clientX-330;
    if(ty+250>window.innerHeight)ty=e.clientY-260;
    tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';
    canvas.style.cursor='pointer';
  }else{tooltip.style.display='none';canvas.style.cursor=zoomedCat?'default':'pointer';}
});
canvas.addEventListener('mouseleave',()=>{hoveredIdx=-1;tooltip.style.display='none';ctx.setTransform(2,0,0,2,0,0);draw();highlightSearch();});

// ===== Click → Zoom =====
canvas.addEventListener('click',e=>{
  if(hoveredIdx<0)return;
  const d=rects[hoveredIdx];
  if(!zoomedCat){
    zoomedCat=d.cat;
    hoveredIdx=-1;tooltip.style.display='none';
    updateZoomUI();resize();updateSidebar();
  }
});

function updateZoomUI(){
  const bc=document.getElementById('breadcrumb');
  const btn=document.getElementById('zoomReset');
  if(zoomedCat){
    bc.innerHTML='<span id="bcAll">전체 직업</span> › <strong style="color:#fff">'+zoomedCat+'</strong>';
    document.getElementById('bcAll').onclick=()=>{zoomedCat=null;hoveredIdx=-1;updateZoomUI();resize();updateSidebar();};
    btn.style.display='inline-block';
  }else{
    bc.innerHTML='<span id="bcAll">전체 직업</span>';
    btn.style.display='none';
  }
}
document.getElementById('zoomReset').addEventListener('click',()=>{
  zoomedCat=null;hoveredIdx=-1;updateZoomUI();resize();updateSidebar();
});

// ===== Search =====
const searchInput=document.getElementById('searchInput');
searchInput.addEventListener('input',e=>{
  searchTerm=e.target.value.trim().toLowerCase();
  highlightSearch();
});

function highlightSearch(){
  const container=document.getElementById('searchResults');
  container.innerHTML='';
  if(!searchTerm)return;
  rects.forEach(r=>{
    if(r.name.toLowerCase().includes(searchTerm)||r.cat.toLowerCase().includes(searchTerm)){
      const div=document.createElement('div');
      div.className='search-highlight';
      div.style.left=r.rx+'px';div.style.top=r.ry+'px';
      div.style.width=Math.max(r.rw,4)+'px';div.style.height=Math.max(r.rh,4)+'px';
      container.appendChild(div);
    }
  });
}

// ===== Sidebar =====
function updateSidebar(){
  const sb=document.getElementById('sidebar');
  const mode=modes[currentMode];
  const visData=getVisibleData();
  const totalEmp=visData.reduce((s,d)=>s+d.emp,0);
  const wavg=visData.reduce((s,d)=>s+mode.getValue(d)*d.emp,0)/totalEmp;
  let html='';

  html+=`<div class="stat-card">
    <h3>${zoomedCat?zoomedCat+' · ':'전체 가중 평균 · '}${mode.title}</h3>
    <div class="big-num">${currentMode==='pay'?Math.round(wavg).toLocaleString()+'만원':
      currentMode==='outlook'?(wavg>0?'+':'')+wavg.toFixed(1)+'%':
      currentMode==='education'?eduLabels[Math.round(wavg)]:
      wavg.toFixed(1)+'/10'}</div>
    <div class="sub">${zoomedCat?'':'전체 '}약 ${(totalEmp/10000).toFixed(0)}만 취업자${zoomedCat?' ('+visData.length+'개 직업)':' ('+occupations.length+'개 직업)'}</div>
  </div>`;

  // Histogram
  if(currentMode==='outlook'){
    const b=[{label:'성장(5%+)',min:5,max:99,color:'#2d8a4e'},{label:'증가(1~4%)',min:1,max:4.9,color:'#5aaa5a'},{label:'보합(0%)',min:0,max:0,color:'#888'},{label:'감소(-1~-4%)',min:-4.9,max:-1,color:'#cc7744'},{label:'급감(-5%~)',min:-99,max:-5,color:'#cc4444'}];
    html+=buildHist('고용 전망 분포',b,d=>d.outlook,visData,totalEmp);
  }else if(currentMode==='pay'){
    const b=[{label:'~2,000만',min:0,max:2000,color:'#cc4444'},{label:'2,000~3,000',min:2001,max:3000,color:'#cc7744'},{label:'3,000~4,000',min:3001,max:4000,color:'#aa8844'},{label:'4,000~5,500',min:4001,max:5500,color:'#5aaa5a'},{label:'5,500만+',min:5501,max:99999,color:'#2d8a4e'}];
    html+=buildHist('임금 분포',b,d=>d.pay,visData,totalEmp);
  }else if(currentMode==='education'){
    const b=eduLabels.map((l,i)=>({label:l,min:i,max:i,color:`hsl(${120-120*(i/5)},60%,42%)`}));
    html+=buildHist('학력 요건 분포',b,d=>d.edu,visData,totalEmp);
  }else{
    const b=[{label:'안전(0~2)',min:0,max:2.9,color:'#2d8a4e'},{label:'낮음(3~4)',min:3,max:4.9,color:'#5aaa5a'},{label:'보통(5~6)',min:5,max:6.9,color:'#aa8844'},{label:'높음(7~8)',min:7,max:8.9,color:'#cc7744'},{label:'매우높음(9+)',min:9,max:10,color:'#cc4444'}];
    html+=buildHist('AI 대체위험 분포',b,d=>d.ai,visData,totalEmp);
  }

  // Category breakdown (only in overview)
  if(!zoomedCat){
    const cats={};
    visData.forEach(d=>{if(!cats[d.cat])cats[d.cat]={emp:0,wsum:0,cnt:0};cats[d.cat].emp+=d.emp;cats[d.cat].wsum+=mode.getValue(d)*d.emp;cats[d.cat].cnt++;});
    const catArr=Object.entries(cats).map(([k,v])=>({name:k,emp:v.emp,avg:v.wsum/v.emp,cnt:v.cnt})).sort((a,b)=>b.emp-a.emp);
    html+=`<div class="stat-card"><h3>산업별 · ${mode.title}</h3>`;
    const maxE=Math.max(...catArr.map(c=>c.emp));
    catArr.forEach(c=>{
      const pct=(c.emp/maxE*100).toFixed(0);
      const avgStr=currentMode==='pay'?Math.round(c.avg).toLocaleString()+'만':currentMode==='outlook'?(c.avg>0?'+':'')+c.avg.toFixed(1)+'%':currentMode==='education'?eduLabels[Math.round(c.avg)]:c.avg.toFixed(1);
      html+=`<div class="hist-row" style="cursor:pointer" onclick="zoomTo('${c.name}')"><div class="hist-label">${c.name}</div><div class="hist-bar-bg"><div class="hist-bar" style="width:${pct}%;background:${mode.getColor({outlook:c.avg,pay:c.avg,edu:c.avg,ai:c.avg})}"></div></div><div class="hist-val">${avgStr}</div></div>`;
    });
    html+='</div>';
  }

  // TOP lists
  const sorted=[...visData];
  if(currentMode==='ai'){
    sorted.sort((a,b)=>b.ai-a.ai);
    html+=`<div class="stat-card"><h3>AI 대체 고위험 TOP 8</h3>`;
    sorted.slice(0,8).forEach(d=>{html+=`<div class="tier-row"><div class="tier-color" style="background:${modes.ai.getColor(d)}"></div><div class="tier-label">${d.name}</div><div class="tier-count">${d.ai.toFixed(1)}</div><div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div></div>`;});
    html+='</div>';
    sorted.sort((a,b)=>a.ai-b.ai);
    html+=`<div class="stat-card"><h3>AI 안전 직업 TOP 8</h3>`;
    sorted.slice(0,8).forEach(d=>{html+=`<div class="tier-row"><div class="tier-color" style="background:${modes.ai.getColor(d)}"></div><div class="tier-label">${d.name}</div><div class="tier-count">${d.ai.toFixed(1)}</div><div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div></div>`;});
    html+='</div>';
  }
  if(currentMode==='outlook'){
    sorted.sort((a,b)=>b.outlook-a.outlook);
    html+=`<div class="stat-card"><h3>🔥 성장 직업 TOP 8</h3>`;
    sorted.slice(0,8).forEach(d=>{html+=`<div class="tier-row"><div class="tier-color" style="background:#2d8a4e"></div><div class="tier-label">${d.name}</div><div class="tier-count">+${d.outlook}%</div><div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div></div>`;});
    html+='</div>';
    sorted.sort((a,b)=>a.outlook-b.outlook);
    html+=`<div class="stat-card"><h3>📉 감소 직업 TOP 8</h3>`;
    sorted.slice(0,8).forEach(d=>{html+=`<div class="tier-row"><div class="tier-color" style="background:#cc4444"></div><div class="tier-label">${d.name}</div><div class="tier-count">${d.outlook}%</div><div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div></div>`;});
    html+='</div>';
  }
  if(currentMode==='pay'){
    sorted.sort((a,b)=>b.pay-a.pay);
    html+=`<div class="stat-card"><h3>💎 고임금 직업 TOP 8</h3>`;
    sorted.slice(0,8).forEach(d=>{html+=`<div class="tier-row"><div class="tier-color" style="background:#2d8a4e"></div><div class="tier-label">${d.name}</div><div class="tier-count">${d.pay.toLocaleString()}만</div><div class="tier-pct">${(d.emp/10000).toFixed(1)}만</div></div>`;});
    html+='</div>';
  }

  sb.innerHTML=html;
}

window.zoomTo=function(cat){zoomedCat=cat;hoveredIdx=-1;updateZoomUI();resize();updateSidebar();};

function buildHist(title,buckets,getter,visData,totalEmp){
  let html=`<div class="stat-card"><h3>${title}</h3>`;
  const counts=buckets.map(b=>{let c=0;visData.forEach(d=>{const v=getter(d);if(v>=b.min&&v<=b.max)c+=d.emp;});return c;});
  const mx=Math.max(...counts);
  buckets.forEach((b,i)=>{
    const pct=(counts[i]/mx*100).toFixed(0);
    const epct=(counts[i]/totalEmp*100).toFixed(1);
    html+=`<div class="hist-row"><div class="hist-label">${b.label}</div><div class="hist-bar-bg"><div class="hist-bar" style="width:${pct}%;background:${b.color}"></div></div><div class="hist-val">${epct}%</div></div>`;
  });
  html+='</div>';return html;
}

// ===== Legend =====
function updateGradient(){
  const gc=document.getElementById('gradientCanvas');
  const gctx=gc.getContext('2d');
  const g=gctx.createLinearGradient(0,0,200,0);
  const mode=modes[currentMode];
  g.addColorStop(0,`rgb(${mode.gradLow.join(',')})`);
  g.addColorStop(1,`rgb(${mode.gradHigh.join(',')})`);
  gctx.fillStyle=g;gctx.fillRect(0,0,200,12);
  document.getElementById('legendLow').textContent=mode.lowLabel;
  document.getElementById('legendHigh').textContent=mode.highLabel;
}

// ===== Mode Buttons =====
document.querySelectorAll('.controls button[data-mode]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.controls button[data-mode]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMode=btn.dataset.mode;
    updateGradient();ctx.setTransform(2,0,0,2,0,0);draw();highlightSearch();updateSidebar();
  });
});

// ===== Init =====
window.addEventListener('resize',()=>{ctx.setTransform(1,0,0,1,0,0);resize();updateSidebar();});
resize();updateGradient();updateSidebar();
</script>
</body>
</html>
